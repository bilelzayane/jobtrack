{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JobTrack{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        container: { center: true, padding: '1.5rem', screens: { '2xl': '1400px' } },
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            border: 'hsl(214,25%,90%)',
            input: 'hsl(214,25%,90%)',
            ring: 'hsl(211,50%,43%)',
            background: 'hsl(210,33%,99%)',
            foreground: 'hsl(222,60%,12%)',
            primary: { DEFAULT: 'hsl(224,60%,15%)', foreground: 'hsl(210,33%,99%)' },
            secondary: { DEFAULT: 'hsl(215,30%,95%)', foreground: 'hsl(224,60%,15%)' },
            muted: { DEFAULT: 'hsl(214,28%,95%)', foreground: 'hsl(218,14%,42%)' },
            accent: { DEFAULT: 'hsl(211,50%,43%)', foreground: 'hsl(0,0%,100%)' },
            destructive: { DEFAULT: 'hsl(0,72%,50%)', foreground: 'hsl(0,0%,100%)' },
            success: { DEFAULT: 'hsl(152,55%,38%)', foreground: 'hsl(0,0%,100%)' },
            warning: { DEFAULT: 'hsl(38,92%,48%)', foreground: 'hsl(0,0%,100%)' },
            card: { DEFAULT: 'hsl(0,0%,100%)', foreground: 'hsl(222,60%,12%)' },
            navy: { DEFAULT: 'hsl(224,60%,15%)', deep: 'hsl(224,65%,11%)' },
          },
          borderRadius: { lg: '0.75rem', md: '0.5rem', sm: '0.375rem' },
          boxShadow: {
            card: '0 1px 3px 0 hsl(224 60% 15% / 0.06), 0 1px 2px -1px hsl(224 60% 15% / 0.04)',
            elevated: '0 10px 30px -12px hsl(224 60% 15% / 0.18)',
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .bg-gradient-soft { background: linear-gradient(180deg, hsl(211,80%,96%,0), hsl(210,33%,99%,100%)); }
    .bg-gradient-hero { background: linear-gradient(135deg, hsl(224,65%,11%) 0%, hsl(224,60%,15%) 60%, hsl(211,55%,28%) 100%); }
    input, select, textarea { outline: none; }
    input:focus, select:focus, textarea:focus { ring: 2px; }
  </style>
</head>
<body class="bg-background text-foreground antialiased">
{% block layout %}
  {% include "jobtrack/partials/navbar.html" %}
  <main>{% block content %}{% endblock %}</main>
  {% include "jobtrack/partials/footer.html" %}
{% endblock %}
<script>lucide.createIcons();</script>
</body>
</html>
