{% extends "jobtrack/base.html" %}
{% block title %}Delete Company — JobTrack{% endblock %}
{% block content %}
<div class="container max-w-lg py-16">
  <div class="rounded-xl border border-red-200 bg-card p-8 shadow-card text-center">
    <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-red-50 text-red-600">
      <i data-lucide="trash-2" class="h-6 w-6"></i>
    </div>
    <h1 class="text-xl font-bold text-navy">Delete Company</h1>
    <p class="mt-2 text-muted-foreground">Are you sure you want to delete <strong>{{ company.name }}</strong>? All related offers will also be deleted.</p>
    <div class="mt-6 flex justify-center gap-3">
      <a href="{% url 'jobtrack:company_detail' company.id %}" class="inline-flex h-10 items-center rounded-md border border-border bg-background px-4 text-sm font-medium hover:bg-secondary">Cancel</a>
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="inline-flex h-10 items-center rounded-md bg-red-600 px-4 text-sm font-medium text-white hover:bg-red-700">Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
