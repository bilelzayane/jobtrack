<header class="sticky top-0 z-40 w-full border-b border-border bg-background/80 backdrop-blur">
  <div class="container flex h-16 items-center justify-between">
    <a href="{% url 'jobtrack:index' %}" class="flex items-center gap-2">
      <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-navy text-white">
        <i data-lucide="briefcase" class="h-5 w-5"></i>
      </div>
      <span class="text-lg font-bold tracking-tight text-navy">JobTrack</span>
    </a>
    <nav class="flex items-center gap-1">
      <a href="{% url 'jobtrack:offers' %}" class="rounded-md px-3 py-2 text-sm font-medium transition-colors hover:bg-secondary hover:text-navy text-muted-foreground">Offers</a>
      <a href="{% url 'jobtrack:companies' %}" class="rounded-md px-3 py-2 text-sm font-medium transition-colors hover:bg-secondary hover:text-navy text-muted-foreground">Companies</a>
      {% if user.is_authenticated %}
      <a href="{% url 'jobtrack:applications' %}" class="rounded-md px-3 py-2 text-sm font-medium transition-colors hover:bg-secondary hover:text-navy text-muted-foreground">Applications</a>
      {% endif %}
    </nav>
    <div class="flex items-center gap-4">
      {% if user.is_authenticated %}
        <span class="text-sm font-medium text-navy">Hi, {{ user.username }}</span>
        <form method="post" action="{% url 'jobtrack:logout' %}" class="inline">
          {% csrf_token %}
          <button type="submit" class="inline-flex h-9 items-center justify-center rounded-md px-3 text-sm font-medium transition-colors hover:bg-secondary hover:text-navy text-muted-foreground">
            Log out
          </button>
        </form>
      {% else %}
        <a href="{% url 'jobtrack:login' %}" class="inline-flex h-9 items-center justify-center rounded-md px-3 text-sm font-medium transition-colors hover:bg-secondary hover:text-navy text-muted-foreground">
          Log in
        </a>
      {% endif %}
      {% if user.is_authenticated %}
      <a href="{% url 'jobtrack:offer_new' %}" class="inline-flex h-9 items-center justify-center gap-2 rounded-md bg-navy px-3 text-sm font-medium text-white hover:bg-navy-deep">
        <i data-lucide="plus" class="h-4 w-4"></i> Add Offer
      </a>
      {% endif %}
    </div>
  </div>
</header>
